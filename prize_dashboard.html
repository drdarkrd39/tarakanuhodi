<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Призовые места — tarakanuhodi.kz</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0d0d1a;
    font-family:'Segoe UI', Arial, sans-serif;
    color:#fff;
    min-height:100vh;
    padding:20px;
}

/* Header */
.header {
    text-align:center;
    margin-bottom:30px;
    padding-bottom:20px;
    border-bottom:2px solid rgba(255,255,255,0.08);
}
.header .logo { font-size:52px; margin-bottom:8px; }
.header h1 { color:#f1c40f; font-size:28px; margin-bottom:6px; }
.header a {
    color:#2ecc71; font-size:16px; font-weight:bold;
    text-decoration:none;
}
.header a:hover { text-decoration:underline; }

/* Stats bar */
.stats-bar {
    display:flex; gap:16px; flex-wrap:wrap;
    justify-content:center; margin-bottom:24px;
}
.stat-card {
    background:#1e1e3a; border:1px solid rgba(255,255,255,0.1);
    border-radius:12px; padding:14px 24px; text-align:center; min-width:140px;
}
.stat-card .val { font-size:28px; font-weight:bold; color:#f1c40f; }
.stat-card .lbl { font-size:12px; color:#888; margin-top:4px; }

/* Filters */
.filters {
    display:flex; gap:12px; flex-wrap:wrap;
    align-items:center; margin-bottom:20px;
}
.filters input, .filters select {
    background:#1e1e3a; border:1px solid #444; border-radius:8px;
    color:#fff; padding:8px 14px; font-size:14px; outline:none;
}
.filters input:focus, .filters select:focus { border-color:#f1c40f; }
.filters input { width:180px; }
.filter-btn {
    background:#1e1e3a; border:2px solid #555; border-radius:8px;
    color:#fff; font-size:14px; padding:8px 16px; cursor:pointer;
    transition:all 0.2s;
}
.filter-btn:hover, .filter-btn.active { border-color:#f1c40f; color:#f1c40f; }
.refresh-btn {
    background:rgba(46,204,113,0.15); border:2px solid #2ecc71;
    border-radius:8px; color:#2ecc71; font-size:14px;
    padding:8px 18px; cursor:pointer; transition:all 0.2s; margin-left:auto;
}
.refresh-btn:hover { background:rgba(46,204,113,0.25); }

/* Table */
.table-wrap {
    background:#111122; border:1px solid rgba(255,255,255,0.08);
    border-radius:14px; overflow-x:auto; -webkit-overflow-scrolling:touch;
}
table {
    width:100%; min-width:560px; border-collapse:collapse;
}
thead th {
    background:#1a1a30; color:#888; font-size:12px;
    font-weight:600; text-transform:uppercase; letter-spacing:0.5px;
    padding:12px 16px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.08);
    cursor:pointer; user-select:none; white-space:nowrap;
}
thead th:hover { color:#f1c40f; }
thead th.sorted { color:#f1c40f; }
tbody tr {
    border-bottom:1px solid rgba(255,255,255,0.05);
    transition:background 0.15s;
}
tbody tr:hover { background:rgba(255,255,255,0.04); }
tbody tr:last-child { border-bottom:none; }
tbody td {
    padding:12px 16px; font-size:14px; color:#ccc;
    white-space:nowrap;
}

/* Position badges */
.pos-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:32px; height:32px; border-radius:50%;
    font-weight:bold; font-size:14px;
}
.pos-1 { background:rgba(255,215,0,0.2); border:2px solid #ffd700; color:#ffd700; }
.pos-2 { background:rgba(192,192,192,0.2); border:2px solid #c0c0c0; color:#c0c0c0; }
.pos-3 { background:rgba(205,127,50,0.2); border:2px solid #cd7f32; color:#cd7f32; }

/* Row highlights */
tr.rank-1 { background:rgba(255,215,0,0.06); }
tr.rank-1:hover { background:rgba(255,215,0,0.1); }
tr.rank-1 td { color:#fff; }

.phone-cell { font-family:monospace; font-size:15px; font-weight:bold; color:#fff; }
.kills-cell { color:#e74c3c; font-weight:bold; }
.time-cell { color:#3498db; }
.wave-cell { color:#9b59b6; }
.date-cell { color:#555; font-size:12px; }

/* Empty / loading */
.empty-state {
    text-align:center; padding:60px 20px; color:#555;
}
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.loading { text-align:center; padding:40px; color:#666; }
.spinner {
    display:inline-block; width:28px; height:28px;
    border:3px solid rgba(241,196,15,0.2);
    border-top-color:#f1c40f;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin-bottom:10px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Discount badges */
.disc-badge {
    display:inline-block; padding:4px 10px; border-radius:20px;
    font-weight:bold; font-size:14px;
}
.disc-1 { background:rgba(255,215,0,0.2); border:1px solid #ffd700; color:#ffd700; }
.disc-15 { background:rgba(46,204,113,0.2); border:1px solid #2ecc71; color:#2ecc71; }
.disc-low { background:rgba(155,89,182,0.15); border:1px solid #9b59b6; color:#ccc; }

/* Position for non-podium */
.pos-other {
    display:inline-flex; align-items:center; justify-content:center;
    width:32px; height:32px; border-radius:50%;
    font-weight:bold; font-size:13px;
    background:rgba(255,255,255,0.05); border:1px solid #333; color:#888;
}
tr.rank-top { background:rgba(46,204,113,0.04); }
tr.rank-top:hover { background:rgba(46,204,113,0.08); }

/* First place banner */
.first-place-banner {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,215,0,0.12); border:1px solid rgba(255,215,0,0.3);
    border-radius:20px; padding:3px 10px; font-size:11px;
    color:#ffd700; font-weight:bold; margin-left:8px;
}

/* Pagination */
.pagination {
    display:flex; gap:8px; justify-content:center;
    align-items:center; margin-top:20px; flex-wrap:wrap;
}
.page-btn {
    background:#1e1e3a; border:1px solid #444; border-radius:8px;
    color:#ccc; padding:6px 14px; cursor:pointer; font-size:14px;
    transition:all 0.15s;
}
.page-btn:hover { border-color:#f1c40f; color:#f1c40f; }
.page-btn.active { background:rgba(241,196,15,0.15); border-color:#f1c40f; color:#f1c40f; }
.page-btn:disabled { opacity:0.3; cursor:default; }
.page-info { color:#666; font-size:13px; }

/* Mobile */
@media (max-width:600px) {
    body { padding:12px; }
    .header h1 { font-size:20px; }
    thead th { padding:10px 10px; font-size:11px; }
    tbody td { padding:10px 10px; font-size:13px; }
    .filters input { width:140px; }
    .stat-card { min-width:100px; padding:10px 14px; }
    .stat-card .val { font-size:22px; }
    /* Hide less important columns on mobile */
    .hide-mobile { display:none; }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">🏆</div>
    <h1>Призовые места</h1>
    <p style="color:#ccc;font-size:18px;margin:8px 0 6px;letter-spacing:0.5px;">Лучшие игроки, получившие скидки у</p>
    <a href="https://tarakanuhodi.kz" target="_blank" style="font-size:22px;">TARAKANUHODI.KZ</a>
</div>

<!-- Stats -->
<div class="stats-bar">
    <div class="stat-card">
        <div class="val" id="statTotal">—</div>
        <div class="lbl">Всего записей</div>
    </div>
    <div class="stat-card">
        <div class="val" id="statFirst">—</div>
        <div class="lbl">🥇 Первых мест</div>
    </div>
    <div class="stat-card">
        <div class="val" id="statUnique">—</div>
        <div class="lbl">Уникальных номеров</div>
    </div>
    <div class="stat-card">
        <div class="val" id="statToday">—</div>
        <div class="lbl">Сегодня</div>
    </div>
</div>

<!-- Filters -->
<div class="filters">
    <input type="text" id="filterPhone" placeholder="🔍 Поиск по номеру..." oninput="applyFilters()">
    <select id="filterPos" onchange="applyFilters()">
        <option value="">Все игроки</option>
        <option value="1">🥇 1-е место</option>
        <option value="top15">🏆 Топ-15</option>
    </select>
    <select id="filterDate" onchange="applyFilters()">
        <option value="">Всё время</option>
        <option value="today">Сегодня</option>
        <option value="week">Эта неделя</option>
        <option value="month">Этот месяц</option>
    </select>
    <select id="filterGame" onchange="applyFilters()">
        <option value="">Все игры</option>
        <option value="survivor">🧑‍🔬 Дезинфектор</option>
        <option value="tetris">🧪 Тетрис</option>
    </select>
    <button class="refresh-btn" onclick="loadData()">🔄 Обновить</button>
</div>

<!-- Table -->
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th onclick="sortBy('position')" id="th-position">Место</th>
                <th onclick="sortBy('phone')" id="th-phone">Телефон</th>
                <th onclick="sortBy('kills')" id="th-kills">☠️ Убито</th>
                <th onclick="sortBy('time_seconds')" id="th-time_seconds" class="hide-mobile">⏱️ Время</th>
                <th onclick="sortBy('wave')" id="th-wave" class="hide-mobile">🌊 Волна</th>
                <th onclick="sortBy('game')" id="th-game" class="hide-mobile">🎮 Игра</th>
                <th onclick="sortBy('discount')" id="th-discount">💰 Скидка</th>
                <th onclick="sortBy('created_at')" id="th-created_at">📅 Дата</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="8" class="loading"><div class="spinner"></div><br>Загрузка...</td></tr>
        </tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>

<script>
const SUPABASE_URL = 'https://adfyjjmchibvxsxvyjvh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZnlqam1jaGlidnhzeHZ5anZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODY4MjIsImV4cCI6MjA5MTY2MjgyMn0.DAB_yCzyP4CgjvBTfSm-FgUCyRcuuLjxkAT-vHRMs9o';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allData = [];
let filteredData = [];
let sortCol = 'position';
let sortDir = 'asc';
let page = 0;
const PAGE_SIZE = 25;

async function loadData() {
    document.querySelectorAll('thead th').forEach(c => c.classList.remove('sorted'));
    document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="8" class="loading"><div class="spinner"></div><br>Загрузка...</td></tr>';

    const { data, error } = await sb.from('prize_log')
        .select('*')
        .order('position', { ascending: true })
        .order('score_kills', { ascending: false })
        .limit(2000);

    if (error) {
        document.getElementById('tableBody').innerHTML =
            `<tr><td colspan="8" class="empty-state"><div class="icon">⚠️</div>Ошибка: ${error.message}</td></tr>`;
        return;
    }

    allData = (data || []).map(r => ({
        position: r.position,
        phone: r.phone,
        kills: r.score_kills,
        time_seconds: r.score_time,
        wave: r.score_wave,
        game: r.game || 'survivor',
        created_at: r.logged_at,
    }));

    updateStats();
    applyFilters();
}

function getDiscount(pos) {
    if (pos === 1) return { label: '30%', cls: 'disc-1' };
    if (pos <= 15) return { label: '15%', cls: 'disc-15' };
    return { label: '5%', cls: 'disc-low' };
}

function updateStats() {
    const today = new Date().toDateString();
    const surv = allData.filter(r => r.game === 'survivor');
    document.getElementById('statTotal').textContent = allData.length;
    document.getElementById('statFirst').textContent = allData.filter(r => r.position === 1).length;
    document.getElementById('statUnique').textContent = new Set(allData.map(r => r.phone + r.game)).size;
    document.getElementById('statToday').textContent = allData.filter(r =>
        new Date(r.created_at).toDateString() === today).length;
}

function applyFilters() {
    const phone = document.getElementById('filterPhone').value.trim();
    const pos = document.getElementById('filterPos').value;
    const dateF = document.getElementById('filterDate').value;
    const gameF = document.getElementById('filterGame').value;
    const now = new Date();

    filteredData = allData.filter(r => {
        if (phone && !r.phone.includes(phone)) return false;
        if (pos === '1' && r.position !== 1) return false;
        if (pos === 'top15' && r.position > 15) return false;
        if (gameF && r.game !== gameF) return false;
        if (dateF) {
            const d = new Date(r.created_at);
            if (dateF === 'today' && d.toDateString() !== now.toDateString()) return false;
            if (dateF === 'week') {
                const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
                if (d < weekAgo) return false;
            }
            if (dateF === 'month') {
                const monthAgo = new Date(now); monthAgo.setMonth(now.getMonth() - 1);
                if (d < monthAgo) return false;
            }
        }
        return true;
    });

    sortData();
    page = 0;
    render();
}

function sortBy(col) {
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = (col === 'created_at') ? 'desc' : 'asc'; }
    document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
    const th = document.getElementById('th-' + col);
    if (th) th.classList.add('sorted');
    sortData();
    render();
}

function sortData() {
    filteredData.sort((a, b) => {
        let av = a[sortCol], bv = b[sortCol];
        if (sortCol === 'created_at') { av = new Date(av); bv = new Date(bv); }
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
    });
}

function render() {
    const tbody = document.getElementById('tableBody');
    const start = page * PAGE_SIZE;
    const slice = filteredData.slice(start, start + PAGE_SIZE);

    if (filteredData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div class="icon">🔍</div>Ничего не найдено</td></tr>';
        renderPagination();
        return;
    }

    tbody.innerHTML = slice.map(r => {
        const pos = r.position;
        const posEmoji = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;
        const posCls = pos <= 3 ? `pos-${pos}` : 'pos-other';
        const rowCls = pos === 1 ? 'rank-1' : pos <= 15 ? 'rank-top' : '';
        const firstBadge = pos === 1 ? '<span class="first-place-banner">👑 Чемпион</span>' : '';
        const disc = getDiscount(pos);
        const gameLabel = r.game === 'tetris'
            ? '<span style="color:#9b59b6;">🧪 Тетрис</span>'
            : '<span style="color:#2ecc71;">🧑‍🔬 Дезинфектор</span>';
        const killsLabel = r.game === 'tetris' ? '💰 ' + r.kills : '☠️ ' + r.kills;
        const timeLabel = r.game === 'tetris'
            ? (r.time_seconds != null ? '📏 ' + r.time_seconds : '—')
            : (r.time_seconds != null ? r.time_seconds + 'с' : '—');
        const dt = new Date(r.created_at);
        const dateStr = dt.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
        const timeStr = dt.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

        return `<tr class="${rowCls}">
            <td><span class="pos-badge ${posCls}">${posEmoji}</span></td>
            <td class="phone-cell">${r.phone}${firstBadge}</td>
            <td class="kills-cell">${killsLabel}</td>
            <td class="time-cell hide-mobile">${timeLabel}</td>
            <td class="wave-cell hide-mobile">${r.wave ?? '—'}</td>
            <td class="hide-mobile">${gameLabel}</td>
            <td><span class="disc-badge ${disc.cls}">${disc.label}</span></td>
            <td class="date-cell">${dateStr}<br><span style="color:#888;">${timeStr}</span></td>
        </tr>`;
    }).join('');

    renderPagination();
}

function renderPagination() {
    const total = filteredData.length;
    const pages = Math.ceil(total / PAGE_SIZE);
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>←</button>`;
    for (let i = 0; i < pages; i++) {
        if (pages > 7 && Math.abs(i - page) > 2 && i !== 0 && i !== pages-1) {
            if (i === 1 || i === pages-2) html += '<span class="page-info">…</span>';
            continue;
        }
        html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages-1?'disabled':''}>→</button>`;
    html += `<span class="page-info">Записей: ${total}</span>`;
    el.innerHTML = html;
}

function goPage(p) {
    const pages = Math.ceil(filteredData.length / PAGE_SIZE);
    if (p < 0 || p >= pages) return;
    page = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

setInterval(loadData, 30000);

// Initial load
loadData();
</script>
</body>
</html>
